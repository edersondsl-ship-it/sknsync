<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SKNSYNC • Recebimentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">
 <img src="img/logo.png" alt="Logo SKNSYNC" class="logo-img">
  <div class="titulo">
    <h1>SKNSYNC</h1>
    <p>Servidor intermediário • Relatórios recebidos</p>
  </div>
</header>

<main>
<a href="/api/recebidos/download/all" class="btn-primary">
  📦 Baixar todos os envios
</a>
<div style="margin-bottom:12px;">
  <label style="display:block; margin-bottom:6px; font-weight:600;">
    Selecionar Tablet
  </label>
  <select id="device">


  <div id="status">Carregando...</div>
  <div id="lista"></div>
</main>

<script>
async function carregar() {
  const status = document.getElementById("status");
  const lista = document.getElementById("lista");

  try {
    const res = await fetch("/api/recebidos");
    const dados = await res.json();

    if (!dados.length) {
      status.textContent = "Nenhum relatório recebido ainda.";
      lista.innerHTML = "";
      return;
    }

    status.textContent = `${dados.length} envio(s) recebido(s)`;

    lista.innerHTML = dados
      .slice()
      .reverse()
      .map((r, i) => {
        const idx = dados.length - 1 - i;
        return `
          <div class="card">
            <strong>${new Date(r.recebidoEm).toLocaleString()}</strong><br>
                      Origem: ${
            typeof r.origem === "object"
              ? `${r.origem.responsavel} (${r.origem.deviceId})`
              : r.origem
          }<br>

            Quantidade: ${r.quantidade}<br><br>

            <a href="/api/recebidos/${idx}/download">
              ⬇️ Baixar (.txt)
            </a>
            &nbsp;|&nbsp;
            <button onclick="excluir(${idx})">
              🗑️ Excluir
            </button>
          </div>
        `;
      })
      .join("");

  } catch (e) {
    status.textContent = "Erro ao carregar dados";
  }
}

async function excluir(idx) {
  if (!confirm("Excluir este envio?")) return;

  await fetch(`/api/recebidos/${idx}`, { method: "DELETE" });
  carregar();
}

carregar();
</script>


</body>
</html>
