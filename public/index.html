<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SKNSYNC • Recebimentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">
  <img src="img/logo.png" alt="Logo SKNSYNC" class="logo-img">
  <div class="titulo">
    <h1>SKNSYNC</h1>
    <p>Servidor intermediário • Relatórios recebidos</p>
  </div>
  <a href="/assistencia.html" class="nav-link">🔧 Assistência</a>
  <a href="/followup.html" class="nav-link">📊 Follow-ups</a>
  <a href="/admin-sync.html" class="nav-link">⚙️ Admin Sync</a>
</header>

<main>
  <div class="status-bar">
    <div id="status">Carregando...</div>
    <a href="/api/recebidos/download/all" class="btn-primary">📦 Baixar todos</a>
  </div>

  <div id="lista"></div>
</main>

<script>
async function carregar() {
  const status = document.getElementById("status");
  const lista = document.getElementById("lista");

  try {
    const res = await fetch("/api/recebidos");
    const dados = await res.json();

    if (!dados.length) {
      status.textContent = "Nenhum relatório recebido.";
      lista.innerHTML = `
        <div class="empty-state">
          <span class="icon">📭</span>
          <p>Nenhum envio recebido ainda.</p>
        </div>
      `;
      return;
    }

    status.textContent = `${dados.length} envio(s) recebido(s)`;

    lista.innerHTML = dados
      .slice()
      .reverse()
      .map((r, i) => {
        const idx = dados.length - 1 - i;

        const origem = typeof r.origem === "object"
          ? `${r.origem.responsavel} · ${r.origem.deviceId}`
          : r.origem;

        const dataRecebido = new Date(r.recebidoEm).toLocaleString("pt-BR");

        let badgeHtml = "";
        if (r.downloads > 0) {
          const dataDownload = new Date(r.baixadoEm).toLocaleString("pt-BR");
          badgeHtml = `<span class="badge badge-success">✓ Baixado em ${dataDownload}</span>`;
        } else {
          badgeHtml = `<span class="badge badge-warning">⏳ Não baixado</span>`;
        }

        return `
          <div class="card">
            <div class="card-header">
              <div class="card-title">${origem}</div>
              ${badgeHtml}
            </div>
            <div class="card-meta">
              <span>📅 ${dataRecebido}</span>
              <span>📋 ${r.quantidade} item(s)</span>
            </div>
            <div class="card-actions">
              <a href="/api/recebidos/${idx}/download" class="btn-download">⬇️ Baixar .txt</a>
              <button onclick="excluir(${idx})" class="btn-danger">🗑️ Excluir</button>
            </div>
          </div>
        `;
      })
      .join("");

  } catch (e) {
    status.textContent = "Erro ao carregar dados";
  }
}

async function excluir(idx) {
  if (!confirm("Excluir este envio?")) return;
  await fetch(`/api/recebidos/${idx}`, { method: "DELETE" });
  carregar();
}

carregar();
</script>

</body>
</html>
