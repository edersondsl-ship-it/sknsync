<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SKNSYNC • Follow-ups</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<style>
  .card-date {
    font-size: 13px; font-weight: 700; color: #277876; margin-bottom: 4px;
  }
  .card-recv {
    font-size: 11.5px; color: #aaa; margin-bottom: 12px;
  }

  .os-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #f0f5f5;
  }
  .os-item:last-child { border-bottom: none; }

  .os-dot {
    width: 11px; height: 11px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px;
  }
  .os-dot-ok      { background: #329B99; }
  .os-dot-warning { background: #f0ad4e; }
  .os-dot-danger  { background: #d9534f; }

  /* IDs sub-rows */
  .ids-wrap {
    margin: 6px 0 4px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .id-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px; color: #555;
  }
  .id-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .id-dot-ok      { background: #329B99; }
  .id-dot-warning { background: #f0ad4e; }
  .id-dot-danger  { background: #d9534f; }

  .id-name {
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .id-hours { font-size: 11px; color: #aaa; flex-shrink: 0; }

  .id-bar-track {
    width: 60px; height: 4px;
    background: #e0f2f1; border-radius: 99px; overflow: hidden; flex-shrink: 0;
  }
  .id-bar-fill { height: 100%; border-radius: 99px; }
  .id-bar-ok      { background: #329B99; }
  .id-bar-warning { background: #f0ad4e; }
  .id-bar-danger  { background: #d9534f; }

  .id-perc { font-size: 11px; font-weight: 700; min-width: 34px; text-align: right; flex-shrink: 0; }
  .id-perc-ok      { color: #329B99; }
  .id-perc-warning { color: #e67e22; }
  .id-perc-danger  { color: #d9534f; }

  .os-item-body { flex: 1; min-width: 0; }
  .os-item-name {
    font-size: 13px; font-weight: 700; color: #1a3a3a;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .os-item-hours { font-size: 11.5px; color: #888; margin-bottom: 5px; }

  .os-bar-track {
    height: 5px; background: #e0f2f1; border-radius: 99px; overflow: hidden;
    margin-bottom: 5px;
  }
  .os-bar-fill { height: 100%; border-radius: 99px; }
  .os-bar-fill.ok      { background: #329B99; }
  .os-bar-fill.warning { background: #f0ad4e; }
  .os-bar-fill.danger  { background: #d9534f; }

  .os-item-obs {
    font-size: 12px; color: #555;
    background: #f8fefe; border-radius: 6px;
    padding: 6px 9px; margin-top: 4px;
    border-left: 3px solid #c9e8e7;
    white-space: pre-wrap;
  }

  .os-perc-badge {
    font-size: 14px; font-weight: 700;
    min-width: 46px; text-align: right; flex-shrink: 0;
  }
  .os-perc-badge.ok      { color: #329B99; }
  .os-perc-badge.warning { color: #e67e22; }
  .os-perc-badge.danger  { color: #d9534f; }

  .filters {
    display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; align-items:center;
  }
  .filters input {
    font-family:inherit; font-size:13px;
    border:1.5px solid #c9e8e7; border-radius:8px;
    padding:7px 12px; outline:none; background:#fff;
    flex: 1; min-width: 200px;
  }
  .filters input:focus { border-color:#329B99; }

  .empty-state { text-align:center; padding:48px 0; color:#bbb; }
  .empty-state .icon { font-size:48px; display:block; margin-bottom:12px; }
</style>
</head>
<body>

<header class="topo">
  <img src="img/logo.png" alt="Logo SKNSYNC" class="logo-img">
  <div class="titulo">
    <h1>SKNSYNC</h1>
    <p>Follow-ups de OS recebidos</p>
  </div>
  <div style="margin-left:auto;display:flex;gap:10px">
    <a href="/" class="nav-link">📋 Relatórios</a>
    <a href="/admin-sync.html" class="nav-link">⚙️ Admin</a>
  </div>
</header>

<main>
  <div class="status-bar">
    <div id="statusTxt">Carregando...</div>
    <button id="btnExportar" class="btn-primary">📦 Exportar todos (.txt)</button>
  </div>

  <div class="filters">
    <input type="text" id="busca" placeholder="🔍 Buscar por OS ou observação...">
  </div>

  <div id="lista"></div>
</main>

<script src="script-followup.js"></script>

</body>
</html>
