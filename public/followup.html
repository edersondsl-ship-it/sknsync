<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SKNSYNC • Follow-ups</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<style>
  .card-date {
    font-size: 13px; font-weight: 700; color: #277876; margin-bottom: 4px;
  }
  .card-recv {
    font-size: 11.5px; color: #aaa; margin-bottom: 12px;
  }

  .os-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #f0f5f5;
  }
  .os-item:last-child { border-bottom: none; }

  .os-dot {
    width: 11px; height: 11px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px;
  }
  .ok      { background: #329B99; }
  .warning { background: #f0ad4e; }
  .danger  { background: #d9534f; }

  .os-item-body { flex: 1; min-width: 0; }
  .os-item-name {
    font-size: 13px; font-weight: 700; color: #1a3a3a;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .os-item-hours { font-size: 11.5px; color: #888; margin-bottom: 5px; }

  .os-bar-track {
    height: 5px; background: #e0f2f1; border-radius: 99px; overflow: hidden;
    margin-bottom: 5px;
  }
  .os-bar-fill { height: 100%; border-radius: 99px; }
  .os-bar-fill.ok      { background: #329B99; }
  .os-bar-fill.warning { background: #f0ad4e; }
  .os-bar-fill.danger  { background: #d9534f; }

  .os-item-obs {
    font-size: 12px; color: #555;
    background: #f8fefe; border-radius: 6px;
    padding: 6px 9px; margin-top: 4px;
    border-left: 3px solid #c9e8e7;
    white-space: pre-wrap;
  }

  .os-perc-badge {
    font-size: 14px; font-weight: 700;
    min-width: 46px; text-align: right; flex-shrink: 0;
  }
  .os-perc-badge.ok      { color: #329B99; }
  .os-perc-badge.warning { color: #e67e22; }
  .os-perc-badge.danger  { color: #d9534f; }

  .filters {
    display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; align-items:center;
  }
  .filters input {
    font-family:inherit; font-size:13px;
    border:1.5px solid #c9e8e7; border-radius:8px;
    padding:7px 12px; outline:none; background:#fff;
    flex: 1; min-width: 200px;
  }
  .filters input:focus { border-color:#329B99; }

  .empty-state { text-align:center; padding:48px 0; color:#bbb; }
  .empty-state .icon { font-size:48px; display:block; margin-bottom:12px; }
</style>
</head>
<body>

<header class="topo">
  <img src="img/logo.png" alt="Logo SKNSYNC" class="logo-img">
  <div class="titulo">
    <h1>SKNSYNC</h1>
    <p>Follow-ups de OS recebidos</p>
  </div>
  <div style="margin-left:auto;display:flex;gap:10px">
    <a href="/" class="nav-link">📋 Relatórios</a>
    <a href="/admin-sync.html" class="nav-link">⚙️ Admin</a>
  </div>
</header>

<main>
  <div class="status-bar">
    <div id="statusTxt">Carregando...</div>
    <button onclick="exportarTodos()" class="btn-primary">📦 Exportar todos (.txt)</button>
  </div>

  <div class="filters">
    <input type="text" id="busca" placeholder="🔍 Buscar por OS ou observação..." oninput="renderLista()">
  </div>

  <div id="lista"></div>
</main>

<script>
let dados = [];

async function carregar() {
  try {
    const res = await fetch('/api/followups');
    dados = await res.json();
    renderLista();
    document.getElementById('statusTxt').textContent =
      `${dados.length} follow-up(s) recebido(s)`;
  } catch(e) {
    document.getElementById('statusTxt').textContent = 'Erro ao carregar';
  }
}

function cls(perc) {
  if (perc > 90) return 'danger';
  if (perc > 70) return 'warning';
  return 'ok';
}

function renderLista() {
  const el  = document.getElementById('lista');
  const q   = document.getElementById('busca').value.toLowerCase();

  let lista = dados.map((r, i) => ({...r, _idx: i}));

  if (q) {
    lista = lista.filter(r => {
      const itens = r.itens || [];
      const textoItens = itens.map(it => (it.os || '') + ' ' + (it.observacoes || '')).join(' ');
      return textoItens.toLowerCase().includes(q);
    });
  }

  if (!lista.length) {
    el.innerHTML = `
      <div class="empty-state">
        <span class="icon">📭</span>
        <p>Nenhum follow-up encontrado.</p>
      </div>`;
    return;
  }

  el.innerHTML = lista.map(r => {
    const recebido = new Date(r.recebidoEm).toLocaleString('pt-BR');
    const itens    = r.itens || [];
    const baixado  = r.downloads > 0
      ? `<span class="badge badge-success">✓ Baixado ${new Date(r.baixadoEm).toLocaleDateString('pt-BR')}</span>`
      : `<span class="badge badge-warning">⏳ Não baixado</span>`;

    const itensHtml = itens.map(it => {
      const perc  = parseFloat(it.perc) || 0;
      const c     = cls(perc);
      const larg  = Math.min(perc, 100).toFixed(1);
      const obsHtml = it.observacoes
        ? `<div class="os-item-obs">${it.observacoes}</div>`
        : '';
      return `
        <div class="os-item">
          <div class="os-dot ${c}"></div>
          <div class="os-item-body">
            <div class="os-item-name">${it.os || '—'}</div>
            ${it.id ? `<div style="font-size:11px;color:#aaa;margin-bottom:3px">#${it.id}</div>` : ''}
            <div class="os-item-hours">Usado: ${Number(it.usado).toFixed(1)}h / Previsto: ${Number(it.previsto).toFixed(1)}h</div>
            <div class="os-bar-track">
              <div class="os-bar-fill ${c}" style="width:${larg}%"></div>
            </div>
            ${obsHtml}
          </div>
          <div class="os-perc-badge ${c}">${perc.toFixed(0)}%</div>
        </div>
      `;
    }).join('');

    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-date">📅 ${r.data || '—'}</div>
            <div class="card-recv">Recebido em ${recebido}</div>
          </div>
          ${baixado}
        </div>

        <div>${itensHtml}</div>

        <div class="card-actions">
          <button onclick="excluir(${r._idx})" class="btn-danger">🗑️ Excluir</button>
        </div>
      </div>
    `;
  }).join('');
}

async function excluir(idx) {
  if (!confirm('Excluir este follow-up?')) return;
  await fetch(`/api/followups/${idx}`, { method: 'DELETE' });
  carregar();
}

async function exportarTodos() {
  if (!dados.length) return alert('Nenhum follow-up para exportar.');
  const res = await fetch('/api/followups/export/all');
  const blob = await res.blob();
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `followups_${new Date().toISOString().slice(0,10)}.txt`;
  a.click(); URL.revokeObjectURL(url);
}

carregar();
setInterval(carregar, 30000);
</script>

</body>
</html>
