<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SKNSYNC • Admin Sync</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">
  <img src="img/logo.png" class="logo-img" alt="Logo SKNSYNC">
  <div class="titulo">
    <h1>SKNSYNC</h1>
    <p>Admin • Sincronização de Tablets</p>
  </div>
  <a href="/" class="nav-link">← Relatórios</a>
</header>

<main>
  <div class="card">
    <p class="section-title">Dispositivo</p>
    <select id="device">
      <option value="tablet1">Tablet 1</option>
      <option value="tablet2">Tablet 2</option>
      <option value="tablet3">Tablet 3</option>
      <option value="tablet4">Tablet 4</option>
      <option value="tablet5">Tablet 5</option>
    </select>

    <p class="section-title">Ordens de Serviço (OS)</p>
    <div id="osList" class="check-group"></div>

    <p class="section-title">Funcionários</p>
    <div id="funcList" class="check-group"></div>

    <div style="margin-top:20px">
      <button onclick="salvar()" class="btn-primary">💾 Salvar JSON</button>
    </div>

    <div id="status-msg"></div>
  </div>
</main>

<script>
let master;

async function carregar() {
  const res = await fetch("/api/sync/master");
  master = await res.json();

  const osDiv = document.getElementById("osList");
  const funcDiv = document.getElementById("funcList");

  osDiv.innerHTML = master.os.map(o => `
    <label>
      <input type="checkbox" value="${o.id_os}">
      ${o.codigo} – ${o.descricao}
    </label>
  `).join("");

  funcDiv.innerHTML = master.funcionarios.map(f => `
    <label>
      <input type="checkbox" value="${f.id}">
      ${f.nome}
    </label>
  `).join("");
}

async function salvar() {
  const device = document.getElementById("device").value;
  const msg = document.getElementById("status-msg");

  const osIds = Array.from(
    document.querySelectorAll("#osList input:checked")
  ).map(i => Number(i.value));

  const funcionarioIds = Array.from(
    document.querySelectorAll("#funcList input:checked")
  ).map(i => Number(i.value));

  const res = await fetch(`/api/sync/device/${device}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ osIds, funcionarioIds })
  });

  const out = await res.json();
  msg.textContent = out.ok ? "✅ JSON gerado com sucesso!" : "❌ Erro ao gerar.";
  msg.style.color = out.ok ? "#155724" : "#721c24";
}

carregar();
</script>

</body>
</html>
